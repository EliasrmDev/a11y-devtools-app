name = "a11y-devtools-api"
main = "src/index.ts"
compatibility_date = "2026-04-17"
compatibility_flags = ["nodejs_compat_v2"]
workers_dev = false
preview_urls = false

# ── Default production vars ───────────────────────────────────────────────────
# Secrets (DATABASE_URL, KEK_CURRENT, KEK_VERSION, RESEND_API_KEY, etc.)
# must be set via `wrangler secret put` — never hardcoded here.
[vars]
AUTH_PROVIDER = "clerk"
ENVIRONMENT = "production"
ALLOWED_ORIGINS = "https://a11y.eliasrm.dev"

# ── Cloudflare rate-limit bindings ────────────────────────────────────────────
# Replace namespace_id values with IDs from the Cloudflare dashboard.
# See docs/DEPLOYMENT.md § Step 3 for setup instructions.

[[unsafe.bindings]]
name = "RATE_LIMITER_AUTH"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_API"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 60, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_PROXY"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 20, period = 60 }

# ── Cron triggers ─────────────────────────────────────────────────────────────
# Runs the job queue processor every minute.
# Handlers: cleanup expired tokens, cleanup soft-deleted, process deletion
# requests, detect inactive accounts, and reminder jobs.
[triggers]
crons = ["* * * * *"]

# ── Development environment ───────────────────────────────────────────────────
[env.dev]
vars = { ENVIRONMENT = "development", AUTH_PROVIDER = "better-auth" }

# Rate limiters are optional in dev (binding is nil-safe: requests pass through)
[[env.dev.unsafe.bindings]]
name = "RATE_LIMITER_AUTH"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 100, period = 60 }

[[env.dev.unsafe.bindings]]
name = "RATE_LIMITER_API"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 200, period = 60 }

[[env.dev.unsafe.bindings]]
name = "RATE_LIMITER_PROXY"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 100, period = 60 }

# ── Staging environment ───────────────────────────────────────────────────────
[env.staging]
vars = { ENVIRONMENT = "staging", AUTH_PROVIDER = "clerk" }

[[env.staging.unsafe.bindings]]
name = "RATE_LIMITER_AUTH"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 60 }

[[env.staging.unsafe.bindings]]
name = "RATE_LIMITER_API"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 60, period = 60 }

[[env.staging.unsafe.bindings]]
name = "RATE_LIMITER_PROXY"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 20, period = 60 }

